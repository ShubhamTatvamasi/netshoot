#------------------------------------------------------------------------------
# /etc/resolv.conf
#
# DNS Resolver Configuration
#
# This file is read by the resolver library (glibc) to determine:
#   - DNS servers to query
#   - Search domains
#   - Resolver behavior
#
# Maximums (glibc):
#   - Up to 3 nameserver entries
#   - Search list length varies by glibc version
#
# NOTE:
# This file may be automatically generated by:
#   - systemd-resolved
#   - NetworkManager
#   - dhclient
#   - netplan
#   - cloud-init
#   - resolvconf
#
# Manual edits may be overwritten.
#------------------------------------------------------------------------------

###############################################################################
# DNS SERVERS
###############################################################################

# Primary DNS server
nameserver 10.0.0.2

# Secondary DNS server
nameserver 10.0.0.3

# Tertiary DNS server
nameserver 1.1.1.1


###############################################################################
# DEFAULT DOMAIN
###############################################################################

# Single default search domain
#
# If a hostname contains no dots, this domain is appended.
#
# Example:
#   ping server01
#
# becomes
#
#   server01.example.com
#
domain example.com


###############################################################################
# SEARCH DOMAINS
###############################################################################

# Multiple search domains
#
# If "search" is specified, it overrides "domain".
#
# Example:
#   ssh api
#
# Resolver attempts:
#
#   api.example.com
#   api.prod.example.com
#   api.internal.example.com
#
search example.com prod.example.com internal.example.com corp.example.net


###############################################################################
# RESOLVER OPTIONS
###############################################################################

options \

    # Number of dots before an absolute lookup is attempted first.
    # Default: 1
    #
    # Example:
    #   ndots:5
    #
    # causes:
    #
    #   myservice.default.svc.cluster.local
    #
    # to be treated as absolute before appending search domains.
    #
    ndots:5 \

    # Number of retries per DNS server
    #
    # Default: 2
    #
    attempts:3 \

    # Timeout (seconds)
    #
    # Default: 5
    #
    timeout:2 \

    # Rotate between DNS servers instead of always using the first.
    #
    rotate \

    # Enable debug output
    #
    # Only works if resolver compiled with debugging.
    #
    debug \

    # Use TCP after packet truncation.
    #
    use-vc \

    # Keep TCP connection open between requests.
    #
    keepalive \

    # Do not use IPv6 nameservers.
    #
    no-aaaa \

    # Disable EDNS0
    #
    # (Normally EDNS0 is enabled automatically.)
    #
    noedns0 \

    # Trust DNSSEC AD bit from upstream resolver.
    #
    trust-ad \

    # Perform AAAA before A lookups.
    #
    inet6 \

    # Disable IP6-dotint lookups.
    #
    ip6-dotint \

    # Disable IPv6 entirely.
    #
    no-ip6-dotint \

    # Disable hostname checking
    #
    no-check-names \

    # Single request mode.
    #
    # Prevents sending A and AAAA in parallel.
    #
    single-request \

    # Same as above but also reuses socket.
    #
    single-request-reopen


###############################################################################
# SORTLIST
###############################################################################

# Controls address ordering returned to applications.
#
# Prefer addresses from local network first.
#
sortlist \
    192.168.1.0/255.255.255.0 \
    10.0.0.0/255.0.0.0 \
    172.16.0.0/255.240.0.0


###############################################################################
# EXAMPLES
###############################################################################

# Host lookup:
#
#    ping database
#
# Resolver tries:
#
#    database.example.com
#    database.prod.example.com
#    database.internal.example.com
#    database.corp.example.net
#
# If ndots threshold met:
#
#    database
#
# first, then search domains.


###############################################################################
# END OF FILE
###############################################################################
